services:
  mysql-primary:
    image: bitnami/mysql:8.0.36
    environment:
      - MYSQL_ROOT_PASSWORD=root-password
      - MYSQL_DATABASE=appdb
      - MYSQL_USER=app
      - MYSQL_PASSWORD=app-password
      - MYSQL_REPLICATION_MODE=master
      - MYSQL_REPLICATION_USER=repl
      - MYSQL_REPLICATION_PASSWORD=repl-password
    ports:
      - "3306:3306"
    volumes:
      - primary_data:/bitnami/mysql/data

  mysql-replica:
    image: bitnami/mysql:8.0.36
    depends_on:
      - mysql-primary
    environment:
      - MYSQL_ROOT_PASSWORD=root-password
      - MYSQL_DATABASE=appdb
      - MYSQL_USER=app
      - MYSQL_PASSWORD=app-password
      - MYSQL_REPLICATION_MODE=slave
      - MYSQL_REPLICATION_USER=repl
      - MYSQL_REPLICATION_PASSWORD=repl-password
      - MYSQL_MASTER_HOST=mysql-primary
      - MYSQL_MASTER_PORT_NUMBER=3306
    ports:
      - "3307:3306"
    volumes:
      - replica_data:/bitnami/mysql/data
volumes:
  primary_data:
  replica_data:
